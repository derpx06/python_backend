version: "3.9"

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:17-alpine
    container_name: taskapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskapi-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/taskapi
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/taskapi
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-jwt-key-change-in-production-k8s9d7f6g5h4j3k2l1}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-super-secret-refresh-key-change-in-production-m9n8b7v6c5x4z3}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ADMIN_EMAIL: admin@taskapi.com
      ADMIN_PASSWORD: admin12345
      ADMIN_NAME: Admin User
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - server_logs:/app/logs

  # ─── Next.js Frontend ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskapi-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - server

volumes:
  pgdata:
    driver: local
  server_logs:
    driver: local
